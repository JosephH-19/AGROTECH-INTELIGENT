<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroTech - Verificador de Sistema</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #10b981 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        h1 {
            color: #1e3a8a;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .checks {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }
        
        .check-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 8px;
            background: #f5f5f5;
            border-left: 4px solid #ddd;
        }
        
        .check-item.loading {
            border-left-color: #f59e0b;
            background: #fffbf0;
        }
        
        .check-item.success {
            border-left-color: #10b981;
            background: #ecfdf5;
        }
        
        .check-item.error {
            border-left-color: #ef4444;
            background: #fef2f2;
        }
        
        .check-icon {
            font-size: 20px;
            min-width: 24px;
        }
        
        .check-label {
            flex: 1;
            font-weight: 500;
            color: #333;
        }
        
        .check-status {
            font-size: 12px;
            color: #666;
            text-align: right;
        }
        
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 30px;
        }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #10b981;
            color: white;
            grid-column: 1 / -1;
        }
        
        .btn-primary:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #e5e7eb;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #d1d5db;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🌾</div>
            <h1>AgroTech</h1>
            <p class="subtitle">Verificador de Sistema</p>
        </div>
        
        <div class="checks">
            <div class="check-item" id="check-app-js">
                <span class="check-icon">⏳</span>
                <span class="check-label">app.js</span>
            </div>
            
            <div class="check-item" id="check-router-js">
                <span class="check-icon">⏳</span>
                <span class="check-label">router.js</span>
            </div>
            
            <div class="check-item" id="check-index-html">
                <span class="check-icon">⏳</span>
                <span class="check-label">index.html</span>
            </div>
            
            <div class="check-item" id="check-localstorage">
                <span class="check-icon">⏳</span>
                <span class="check-label">localStorage</span>
            </div>
            
            <div class="check-item" id="check-indexeddb">
                <span class="check-icon">⏳</span>
                <span class="check-label">IndexedDB</span>
            </div>
            
            <div class="check-item" id="check-service-worker">
                <span class="check-icon">⏳</span>
                <span class="check-label">Service Worker API</span>
            </div>
            
            <div class="check-item" id="check-network">
                <span class="check-icon">⏳</span>
                <span class="check-label">Conexión a Internet</span>
            </div>
        </div>
        
        <div class="actions">
            <button class="btn-secondary" onclick="clearCache()">🗑️ Limpiar Caché</button>
            <button class="btn-secondary" onclick="openDevTools()">🛠️ DevTools (F12)</button>
            <button class="btn-primary" id="go-to-app" onclick="goToApp()" disabled>✅ Ir a AgroTech</button>
        </div>
        
        <div class="footer">
            AgroTech v1.0 | Sistema de Gestión Agrícola Inteligente
        </div>
    </div>
    
    <script>
        const checks = {
            'check-app-js': async () => {
                try {
                    const response = await fetch('js/app.js');
                    return response.ok;
                } catch (e) {
                    return false;
                }
            },
            'check-router-js': async () => {
                try {
                    const response = await fetch('js/router.js');
                    return response.ok;
                } catch (e) {
                    return false;
                }
            },
            'check-index-html': async () => {
                try {
                    const response = await fetch('index.html');
                    return response.ok;
                } catch (e) {
                    return false;
                }
            },
            'check-localstorage': () => {
                try {
                    localStorage.setItem('test', 'test');
                    localStorage.removeItem('test');
                    return true;
                } catch (e) {
                    return false;
                }
            },
            'check-indexeddb': async () => {
                try {
                    const request = indexedDB.open('test');
                    return await new Promise(resolve => {
                        request.onsuccess = () => resolve(true);
                        request.onerror = () => resolve(false);
                    });
                } catch (e) {
                    return false;
                }
            },
            'check-service-worker': () => {
                return 'serviceWorker' in navigator;
            },
            'check-network': () => {
                return navigator.onLine;
            }
        };
        
        async function runChecks() {
            let allPassed = true;
            
            for (const [checkId, checkFn] of Object.entries(checks)) {
                try {
                    const result = await Promise.resolve(checkFn());
                    const element = document.getElementById(checkId);
                    
                    if (result) {
                        element.classList.remove('loading');
                        element.classList.add('success');
                        element.querySelector('.check-icon').textContent = '✅';
                    } else {
                        element.classList.remove('loading');
                        element.classList.add('error');
                        element.querySelector('.check-icon').textContent = '❌';
                        allPassed = false;
                    }
                } catch (e) {
                    const element = document.getElementById(checkId);
                    element.classList.remove('loading');
                    element.classList.add('error');
                    element.querySelector('.check-icon').textContent = '❌';
                    allPassed = false;
                }
            }
            
            const button = document.getElementById('go-to-app');
            if (allPassed || document.querySelectorAll('.check-item.success').length >= 5) {
                button.disabled = false;
            }
        }
        
        function clearCache() {
            if ('caches' in window) {
                caches.keys().then(names => {
                    names.forEach(name => caches.delete(name));
                });
            }
            localStorage.clear();
            sessionStorage.clear();
            alert('✅ Caché limpiada');
        }
        
        function openDevTools() {
            alert('Presiona F12 para abrir Developer Tools');
        }
        
        function goToApp() {
            window.location.href = '/';
        }
        
        // Ejecutar verificaciones al cargar
        window.addEventListener('load', runChecks);
        
        // Verificar conexión
        window.addEventListener('online', () => {
            const check = document.getElementById('check-network');
            check.classList.add('success');
            check.querySelector('.check-icon').textContent = '✅';
        });
        
        window.addEventListener('offline', () => {
            const check = document.getElementById('check-network');
            check.classList.add('error');
            check.querySelector('.check-icon').textContent = '❌';
        });
    </script>
</body>
</html>
